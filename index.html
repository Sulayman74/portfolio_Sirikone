<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Optimisation Mobile / PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#07070f" />
    
    <!-- iOS / Apple tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sirikone" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
    <link rel="shortcut icon" href="/images/luffy.ico" type="image/x-icon">

    <!-- SEO & Informations -->
    <title>Sirikone KEOHAVONG — Concepteur Développeur Full-Stack</title>
    <meta name="description" content="Sirikone KEOHAVONG — Concepteur Développeur Full-Stack & créateur d'apps mobiles. Angular, NestJS, iOS Native, Firebase, PostgreSQL.">
    <meta name="author" content="Keohavong Sirikone">

    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Loader anti-écran-blanc (affiché dès le 1er paint, avant que React monte).
         React efface le contenu de #root au montage : le loader disparaît seul. -->
    <style>
      html, body { background-color: #07070f; margin: 0; }
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #07070f;
        z-index: 9999;
      }
      #app-loader .app-loader__spinner {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 3px solid rgba(79, 142, 247, 0.2);
        border-top-color: #4f8ef7;
        animation: app-loader-spin 0.8s linear infinite;
      }
      @keyframes app-loader-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #app-loader .app-loader__spinner { animation-duration: 2.4s; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader" aria-hidden="true">
        <div class="app-loader__spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
